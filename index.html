<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A canvas chain-reaction game." />
    <title>Canvas Reaction</title>
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <h1>Canvas Reaction</h1>
        <p>Click the game area to start a reaction</p>
      </header>

      <canvas
        id="screen"
        class="game-screen"
        width="620"
        height="400"
        aria-label="Canvas Reaction game area"
      ></canvas>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
